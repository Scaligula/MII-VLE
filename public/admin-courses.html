<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subject Management — MII VLE</title>
  <link rel="stylesheet" href="MII.css" />
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 14px; padding: 1.5rem;
      width: min(600px, 96vw); max-height: 85vh;
      overflow-y: auto; position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; cursor: pointer;
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text-muted); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.45rem 0.75rem;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text); font-size: 0.84rem;
      font-family: inherit; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--green); box-shadow: 0 0 0 2px var(--green-dim);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-footer { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn {
      padding: 0.5rem 1rem; border: none; border-radius: 6px;
      font-size: 0.84rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--green); color: var(--white); }
    .btn-primary:hover { background: var(--green-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-danger { background: #7a2020; color: var(--white); }
    .btn-danger:hover { background: #8b2626; }
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-input {
      flex: 1; padding: 0.45rem 0.75rem;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text); font-size: 0.84rem;
    }
    .search-input:focus { outline: none; border-color: var(--green); }
    .subjects-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .subjects-table thead { background: var(--surface2); }
    .subjects-table th { 
      padding: 0.75rem; text-align: left; font-weight: 600; 
      color: var(--text-muted); font-size: 0.8rem; border-bottom: 1px solid var(--border2);
    }
    .subjects-table td { 
      padding: 0.75rem; border-bottom: 1px solid var(--border2); 
      font-size: 0.84rem; color: var(--text);
    }
    .subjects-table tbody tr { transition: background 0.15s; }
    .subjects-table tbody tr:hover { background: var(--surface2); }
    .subject-name { font-weight: 600; color: var(--green); }
    .subject-badge { 
      display: inline-block; padding: 0.2rem 0.5rem;
      background: rgba(50,100,180,0.13); color: #80aaee;
      border-radius: 4px; font-size: 0.7rem; font-weight: 600;
    }
    .subject-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      background: none; border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text-muted);
      padding: 0.25rem 0.5rem; cursor: pointer; font-size: 0.78rem;
      transition: all 0.15s; white-space: nowrap;
    }
    .action-btn:hover { background: var(--surface3); color: var(--text); }
    .action-btn.danger { border-color: rgba(180,50,50,0.3); color: #e08080; }
    .action-btn.danger:hover { background: rgba(180,50,50,0.1); }
    .action-btn.primary { border-color: var(--green-border); color: #7ec87e; }
    .action-btn.primary:hover { background: var(--green-dim); }
    .icon-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 0.9rem; padding: 0.25rem;
      transition: color 0.15s;
    }
    .icon-btn:hover { color: var(--green); }
    .icon-btn.delete:hover { color: #ff6b6b; }
    .empty-state {
      text-align: center; padding: 2rem;
      color: var(--text-muted);
    }
    .badge {
      display: inline-block; padding: 0.2rem 0.5rem;
      background: var(--green-dim); color: var(--green);
      border-radius: 4px; font-size: 0.75rem;
      font-weight: 600;
    }
    .subject-badge {
      display: inline-block; padding: 0.2rem 0.5rem;
      background: rgba(50,100,180,0.13); color: #80aaee;
      border-radius: 4px; font-size: 0.7rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-brand">📚 MII VLE</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <div class="topbar-avatar" id="avatarBtn"></div>
        <div>
          <div class="topbar-name" id="userName">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="nav-section-label">Administration</div>
      <a class="nav-item" href="admin-dashboard.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">⊞</span> Dashboard</a>
      <a class="nav-item" href="admin-users.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">👥</span> User Management</a>
      <a class="nav-item" href="admin-students.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">🧒</span> Students</a>
      <a class="nav-item active" href="admin-courses.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; background: var(--green-dim); color: #8ecf8e; font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid var(--green);"><span style="font-size: 1rem; width: 18px; text-align: center;">📖</span> Subjects</a>
      <a class="nav-item" id="adminMgmtNav" href="admin-admins.html" style="display: none; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">👑</span> Admin Management</a>
      <div style="height: 1px; background: var(--border); margin: 0.5rem 0;"></div>
      <div class="nav-section-label">Account</div>
      <a class="nav-item" href="profile.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">👤</span> Profile</a>
      <a class="nav-item" href="settings.html" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">⚙</span> Settings</a>
      <a class="nav-item" href="/auth/logout" style="display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.84rem; font-weight: 500; cursor: pointer; border-radius: 0; transition: all 0.15s; border-left: 2px solid transparent;"><span style="font-size: 1rem; width: 18px; text-align: center;">⏻</span> Sign Out</a>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="page-header">
        <h1>Subject Management</h1>
        <p>Create and manage subjects</p>
      </div>

      <div class="card">
        <div class="search-bar">
          <input type="text" class="search-input" id="searchInput" placeholder="Search by name...">
          <button class="btn btn-primary" onclick="openAddSubjectModal()">➕ Add Subject</button>
        </div>

        <div id="subjectsContainer">
          <div class="empty-state">Loading subjects...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Subject Modal -->
  <div class="modal-overlay" id="subjectModal">
    <div class="modal">
      <button class="modal-close" onclick="closeSubjectModal()">✕</button>
      <div class="modal-title" id="subjectModalTitle">Add New Subject</div>

      <form id="subjectForm" onsubmit="handleSaveSubject(event)">
        <div class="form-group">
          <label>Subject Name *</label>
          <input type="text" id="subjectName" required>
        </div>

        <div class="form-group">
          <label>Grade Level *</label>
          <select id="subjectGrade" required>
            <option value="">-- Select a Grade --</option>
            <option value="Kinder 1">Kinder 1</option>
            <option value="Kinder 2">Kinder 2</option>
            <option value="Grade 1">Grade 1</option>
            <option value="Grade 2">Grade 2</option>
            <option value="Grade 3">Grade 3</option>
            <option value="Grade 4">Grade 4</option>
            <option value="Grade 5">Grade 5</option>
            <option value="Grade 6">Grade 6</option>
            <option value="Grade 7">Grade 7</option>
            <option value="Grade 8">Grade 8</option>
            <option value="Grade 9">Grade 9</option>
            <option value="Grade 10">Grade 10</option>
            <option value="Grade 11">Grade 11</option>
            <option value="Grade 12">Grade 12</option>
          </select>
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select id="subjectCategory" required>
            <option value="">-- Select a Category --</option>
            <option value="Aqeedah & Fiqh">Aqeedah & Fiqh</option>
            <option value="Seerah & Hadith">Seerah & Hadith</option>
            <option value="Qur'an Reading">Qur'an Reading</option>
            <option value="Akhlaq">Akhlaq</option>
            <option value="Arabic Language">Arabic Language</option>
            <option value="Tawheed">Tawheed</option>
            <option value="Fiqh">Fiqh</option>
            <option value="Lugah">Lugah</option>
            <option value="Khat Wa Imla">Khat Wa Imla</option>
            <option value="Hisab">Hisab</option>
            <option value="Hadith">Hadith</option>
            <option value="Qur'an">Qur'an</option>
            <option value="Qawaed">Qawaed</option>
            <option value="Seerah">Seerah</option>
            <option value="Qir'ah">Qir'ah</option>
            <option value="Tafseer">Tafseer</option>
            <option value="Tareeh">Tareeh</option>
            <option value="Imla">Imla</option>
            <option value="Ta'beer">Ta'beer</option>
            <option value="Mustalahol Hadith">Mustalahol Hadith</option>
            <option value="Ulomol Qur'an">Ulomol Qur'an</option>
            <option value="Nahu">Nahu</option>
            <option value="Faraidh">Faraidh</option>
            <option value="Usolot Tafseer">Usolot Tafseer</option>
            <option value="Ulomol Hadith">Ulomol Hadith</option>
            <option value="Usolol Fiqh">Usolol Fiqh</option>
            <option value="Tareehol Fiqh">Tareehol Fiqh</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="subjectDescription" rows="3" placeholder="Subject description..."></textarea>
        </div>

        <div class="form-group">
          <label>Teacher *</label>
          <select id="subjectTeacher" required>
            <option value="">-- Select a Teacher --</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeSubjectModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Subject</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Subject Detail Modal -->
  <div class="modal-overlay" id="subjectDetailModal">
    <div class="modal">
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
      <div class="modal-title">Subject Details</div>
      <div id="subjectDetailContent" style="font-size: 0.84rem; line-height: 1.8;">
        <!-- Populated dynamically -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDetailModal()">Close</button>
        <button class="btn btn-primary" onclick="editCurrentSubject()">Edit</button>
        <button class="btn btn-danger" onclick="deleteCurrentSubject()">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let currentSubjectId = null;
    let allSubjects = [];

    async function loadSubjects() {
      try {
        const res = await fetch('/api/admin/courses', {
          headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) {
          if (res.status === 401) window.location.href = '/';
          throw new Error('Failed to load subjects');
        }
        allSubjects = await res.json();
        renderSubjects(allSubjects);
      } catch (err) {
        console.error(err);
        document.getElementById('subjectsContainer').innerHTML = '<div class="empty-state">Error loading subjects</div>';
      }
    }

    function renderSubjects(subjects) {
      const container = document.getElementById('subjectsContainer');
      if (!subjects.length) {
        container.innerHTML = '<div class="empty-state">No subjects found. Create your first subject!</div>';
        return;
      }
      
      container.innerHTML = '<table class="subjects-table"><thead><tr><th>Subject Name</th><th>Grade</th><th>Category</th><th>Teacher</th><th>Students</th><th>Actions</th></tr></thead><tbody>' + subjects.map(s => `
        <tr>
          <td><span class="subject-name">${s.name}</span></td>
          <td>${s.grade || 'N/A'}</td>
          <td><span class="subject-badge">${s.subject}</span></td>
          <td>${s.teacher?.name || 'Unassigned'}</td>
          <td>${s.students?.length || 0}</td>
          <td>
            <div class="subject-actions">
              <button class="action-btn primary" onclick="viewSubjectDetail('${s._id}')">📋 View</button>
              <button class="action-btn danger" onclick="deleteSubject('${s._id}')">🗑 Delete</button>
            </div>
          </td>
        </tr>
      `).join('') + '</tbody></table>';
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = allSubjects.filter(s =>
        s.name.toLowerCase().includes(query) ||
        s.subject.toLowerCase().includes(query) ||
        (s.grade && s.grade.toLowerCase().includes(query))
      );
      renderSubjects(filtered);
    });

    async function openAddSubjectModal() {
      currentSubjectId = null;
      document.getElementById('subjectModalTitle').textContent = 'Add New Subject';
      document.getElementById('subjectForm').reset();
      await loadTeachers();
      document.getElementById('subjectModal').classList.add('open');
    }

    async function loadTeachers() {
      try {
        const res = await fetch('/api/admin/users');
        if (!res.ok) throw new Error('Failed to load teachers');
        const users = await res.json();
        const teachers = users.filter(u => u.role === 'staff');
        const select = document.getElementById('subjectTeacher');
        const currentValue = select.value;
        select.innerHTML = '<option value="">-- Select a Teacher --</option>' +
          teachers.map(t => `<option value="${t._id}">${t.name}</option>`).join('');
        select.value = currentValue;
      } catch (err) {
        console.error('Error loading teachers:', err);
      }
    }

    function closeSubjectModal() {
      document.getElementById('subjectModal').classList.remove('open');
      document.getElementById('subjectForm').reset();
      currentSubjectId = null;
    }

    async function handleSaveSubject(event) {
      event.preventDefault();

      const subjectData = {
        name: document.getElementById('subjectName').value,
        subject: document.getElementById('subjectCategory').value,
        grade: document.getElementById('subjectGrade').value,
        description: document.getElementById('subjectDescription').value,
        teacher: document.getElementById('subjectTeacher').value
      };

      try {
        let url = '/api/admin/courses';
        let method = 'POST';

        if (currentSubjectId) {
          url = `/api/admin/courses/${currentSubjectId}`;
          method = 'PUT';
        }

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subjectData)
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Failed to save subject');
        }

        closeSubjectModal();
        await loadSubjects();
        alert('Subject saved successfully!');
      } catch (err) {
        console.error(err);
        alert('Error saving subject: ' + err.message);
      }
    }

    async function editSubject(subjectId) {
      try {
        const res = await fetch(`/api/admin/courses/${subjectId}`);
        if (!res.ok) throw new Error('Failed to load subject');
        const subject = await res.json();
        currentSubjectId = subjectId;

        document.getElementById('subjectModalTitle').textContent = 'Edit Subject';
        document.getElementById('subjectName').value = subject.name;
        document.getElementById('subjectGrade').value = subject.grade || '';
        document.getElementById('subjectCategory').value = subject.subject || '';
        document.getElementById('subjectDescription').value = subject.description || '';
        
        await loadTeachers();
        document.getElementById('subjectTeacher').value = subject.teacher?._id || '';

        document.getElementById('subjectModal').classList.add('open');
      } catch (err) {
        console.error(err);
        alert('Error loading subject for edit');
      }
    }

    async function viewSubjectDetail(subjectId) {
      try {
        const res = await fetch(`/api/admin/courses/${subjectId}`);
        if (!res.ok) throw new Error('Failed to load subject');
        const subject = await res.json();
        currentSubjectId = subjectId;

        const detail = `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
              <strong>Subject Name:</strong> ${subject.name}<br>
              <strong>Grade:</strong> ${subject.grade || 'N/A'}<br>
              <strong>Category:</strong> ${subject.subject || 'N/A'}<br>
              <strong>Teacher:</strong> ${subject.teacher?.name || 'Unassigned'}
            </div>
            <div>
              <strong>Students:</strong> ${subject.students?.length || 0}<br>
              <strong>Assignments:</strong> ${subject.assignments?.length || 0}<br>
              <strong>Announcements:</strong> ${subject.announcements?.length || 0}
            </div>
          </div>
          <div style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
            <strong style="display: block; margin-bottom: 0.5rem;">Description:</strong>
            <p>${subject.description || 'No description provided'}</p>
          </div>
        `;

        document.getElementById('subjectDetailContent').innerHTML = detail;
        document.getElementById('subjectDetailModal').classList.add('open');
      } catch (err) {
        console.error(err);
        alert('Error loading subject details');
      }
    }

    function closeDetailModal() {
      document.getElementById('subjectDetailModal').classList.remove('open');
    }

    function editCurrentSubject() {
      if (currentSubjectId) {
        closeDetailModal();
        editSubject(currentSubjectId);
      }
    }

    function deleteCurrentSubject() {
      if (currentSubjectId) {
        closeDetailModal();
        deleteSubject(currentSubjectId);
      }
    }

    async function deleteSubject(subjectId) {
      if (!confirm('Are you sure you want to delete this subject? This action cannot be undone.')) return;

      try {
        const res = await fetch(`/api/admin/courses/${subjectId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete subject');
        await loadSubjects();
        alert('Subject deleted successfully!');
      } catch (err) {
        console.error(err);
        alert('Error deleting subject');
      }
    }

    // Initialize
    loadSubjects();
    initializeRoleBasedNav('admin');
  </script>
</body>
</html>
